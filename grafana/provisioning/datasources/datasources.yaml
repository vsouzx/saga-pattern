apiVersion: 1
datasources:
  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      derivedFields:
        - name: TraceID
          datasourceUid: jaeger
          matcherRegex: '"trace_id":"(\w+)"'
          url: '$${__value.raw}'
